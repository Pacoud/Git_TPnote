services:
  frontend:
    build:
      context: ./frontend
    image: devops-tp-frontend:local
    container_name: devops_tp_frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

  backend:
    build:
      context: ./backend
    image: devops-tp-backend:local
    container_name: devops_tp_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-devopsdb}
      DB_USER: ${POSTGRES_USER:-devops}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-devops}
    ports:
      - "3000:3000"

  postgres:
    image: postgres:15-alpine
    container_name: devops_tp_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devopsdb}
      POSTGRES_USER: ${POSTGRES_USER:-devops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devops}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devops} -d ${POSTGRES_DB:-devopsdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
