name: Pipeline CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Build backend
        working-directory: backend
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Install end-to-end test dependencies
        working-directory: tests
        run: npm install

      - name: Start application stack
        run: docker compose up --build -d

      - name: Wait for frontend and backend
        working-directory: tests
        run: npx wait-on http-get://127.0.0.1:3000/api/health http-get://127.0.0.1:8080

      - name: Run Cypress tests
        working-directory: tests
        env:
          CYPRESS_BASE_URL: http://127.0.0.1:8080
        run: npx cypress run

      - name: Capture Docker Compose logs
        if: failure()
        run: docker compose logs --no-color > docker-compose.log

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            tests/cypress/screenshots
            tests/cypress/videos
          if-no-files-found: ignore

      - name: Upload Docker Compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: docker-compose.log
          if-no-files-found: ignore

      - name: Stop application stack
        if: always()
        run: docker compose down -v

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      registry_image: ${{ steps.image_vars.outputs.registry_image }}
      short_sha: ${{ steps.image_vars.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image names
        id: image_vars
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "registry_image=${REGISTRY}/${owner}/${repo}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.image_vars.outputs.registry_image }}/frontend:${{ steps.image_vars.outputs.short_sha }}
            ${{ steps.image_vars.outputs.registry_image }}/frontend:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image_vars.outputs.registry_image }}/backend:${{ steps.image_vars.outputs.short_sha }}
            ${{ steps.image_vars.outputs.registry_image }}/backend:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy on target server
        env:
          AWS_HOST: ${{ secrets.HOST }}
          AWS_USER: ${{ secrets.USERNAME }}
          AWS_PORT: ${{ secrets.PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.KEY }}
          CI_REGISTRY: ${{ env.REGISTRY }}
          CI_REGISTRY_USER: ${{ github.repository_owner }}
          CI_REGISTRY_PASSWORD: ${{ secrets.TOKENCICD }}
          CI_REGISTRY_IMAGE: ${{ needs.package.outputs.registry_image }}
          CI_COMMIT_SHORT_SHA: ${{ needs.package.outputs.short_sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
        run: ./deploy.sh
